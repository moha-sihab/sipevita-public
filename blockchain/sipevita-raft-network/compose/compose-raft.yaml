  # ---------------------------------------------------------------------------
  # peer0.org1.sipevita.example.com  (Org1MSP — ATR/BPN Pusat)
  # ---------------------------------------------------------------------------
  peer0.org1.sipevita.example.com:
    container_name: peer0.org1.sipevita.example.com
    image: hyperledger/fabric-peer:2.5.15
    labels:
      service: sipevita-raft
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Peer identity
      - CORE_PEER_ID=peer0.org1.sipevita.example.com
      - CORE_PEER_ADDRESS=peer0.org1.sipevita.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.sipevita.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      # MSP
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      # Gossip — single peer per org: bootstrap to self
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.sipevita.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.sipevita.example.com:7051
      # Services
      - CORE_PEER_GATEWAY_ENABLED=true
      - CORE_PEER_DISCOVERY_ENABLED=true
      # Operations
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
      - CORE_METRICS_PROVIDER=prometheus
      # Chaincode execution
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      # Chaincode container runtime (Docker-in-Docker via host socket)
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=sipevita_raft
    working_dir: /root
    command: peer node start
    volumes:
      - ../organizations/peerOrganizations/org1.sipevita.example.com/peers/peer0.org1.sipevita.example.com:/etc/hyperledger/fabric
      - ./peercfg:/etc/hyperledger/peercfg
      - peer0_org1_data:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - 17051:7051
      - 17444:9444
