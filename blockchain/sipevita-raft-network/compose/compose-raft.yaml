# compose-raft.yaml — SIPEVITA Raft Network Docker Compose topology
#
# 4 peer organizations (Org1–Org4 MSP) + 1 orderer org (OrdererMSP, 3 Raft nodes)
# Docker network:   sipevita_raft
# Project name:     sipevita-raft
#
# Run from project root:
#   docker compose -f compose/compose-raft.yaml -p sipevita-raft up -d
#
# Host port strategy (dedicated, does not conflict with test-network):
#   Org1 peer:    17051 (gRPC), 17444 (ops)
#   Org2 peer:    18051 (gRPC), 18444 (ops)
#   Org3 peer:    19051 (gRPC), 19444 (ops)
#   Org4 peer:    20051 (gRPC), 20444 (ops)
#   orderer1:     17050 (gRPC), 17053 (admin), 17443 (ops)
#   orderer2:     18050 (gRPC), 18053 (admin), 18443 (ops)
#   orderer3:     19050 (gRPC), 19053 (admin), 19443 (ops)
#
# Internal Docker ports remain standard: peers 7051/7052/9444, orderers 7050/7053/9443
# Bind-mount paths are relative to compose/ (one level below project root).
# Do not start chaincode containers in this file.
# Do not reference test-network volumes, networks, or container names.

name: sipevita-raft

###############################################################################
# Named volumes — one per node, never shared
###############################################################################
volumes:
  peer0_org1_data:
  peer0_org2_data:
  peer0_org3_data:
  peer0_org4_data:
  orderer1_data:
  orderer2_data:
  orderer3_data:

###############################################################################
# Docker network
###############################################################################
networks:
  sipevita_raft:
    name: sipevita_raft
    driver: bridge

###############################################################################
# Services
###############################################################################
services:

  # ---------------------------------------------------------------------------
  # orderer1.sipevita.example.com
  # ---------------------------------------------------------------------------
  orderer1.sipevita.example.com:
    container_name: orderer1.sipevita.example.com
    image: hyperledger/fabric-orderer:2.5.15
    labels:
      service: sipevita-raft
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Cluster TLS (used for orderer-to-orderer Raft communication)
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Bootstrap method — none means osnadmin channel join is used (Fabric 2.5 channel participation)
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      # Channel participation API (Fabric 2.5 — required for osnadmin channel join)
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      # Admin endpoint
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      # Operations and metrics
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /root
    command: orderer
    volumes:
      - ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer1.sipevita.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer1.sipevita.example.com/tls:/var/hyperledger/orderer/tls
      - orderer1_data:/var/hyperledger/production/orderer
    ports:
      - 17050:7050
      - 17053:7053
      - 17443:9443
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/7050 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sipevita_raft

