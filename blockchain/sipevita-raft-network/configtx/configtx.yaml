# configtx.yaml — SIPEVITA Raft Network
# Hyperledger Fabric 2.5.x channel configuration
#
# Organizations: Org1MSP, Org2MSP, Org3MSP, Org4MSP (peers), OrdererMSP (Raft)
# Consensus:     etcdraft (3 consenters, 2-of-3 quorum)
# Channel:       mychannel
# Capabilities:  Channel V2_0, Orderer V2_0, Application V2_5
#
# NOTE: Paths are relative to this file's directory (configtx/).
# FABRIC_CFG_PATH must point to this directory when running configtxgen.
# Do not use host-mapped ports here; use internal Docker ports (7050/7051).
# Do not reference test-network paths anywhere in this file.

---

################################################################################
# Organizations
################################################################################
Organizations:

  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/sipevita.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    # Internal Docker endpoints for orderer-to-orderer and peer-to-orderer communication
    OrdererEndpoints:
      - orderer1.sipevita.example.com:7050
      - orderer2.sipevita.example.com:7050
      - orderer3.sipevita.example.com:7050

  - &Org1
    Name: Org1MSP
    ID: Org1MSP
    MSPDir: ../organizations/peerOrganizations/org1.sipevita.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.peer', 'Org1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org1MSP.peer')"
    AnchorPeers:
      - Host: peer0.org1.sipevita.example.com
        Port: 7051

  - &Org2
    Name: Org2MSP
    ID: Org2MSP
    MSPDir: ../organizations/peerOrganizations/org2.sipevita.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.peer', 'Org2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org2MSP.peer')"
    AnchorPeers:
      - Host: peer0.org2.sipevita.example.com
        Port: 7051

  - &Org3
    Name: Org3MSP
    ID: Org3MSP
    MSPDir: ../organizations/peerOrganizations/org3.sipevita.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org3MSP.admin', 'Org3MSP.peer', 'Org3MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org3MSP.admin', 'Org3MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org3MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org3MSP.peer')"
    AnchorPeers:
      - Host: peer0.org3.sipevita.example.com
        Port: 7051

  - &Org4
    Name: Org4MSP
    ID: Org4MSP
    MSPDir: ../organizations/peerOrganizations/org4.sipevita.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org4MSP.admin', 'Org4MSP.peer', 'Org4MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org4MSP.admin', 'Org4MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org4MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org4MSP.peer')"
    AnchorPeers:
      - Host: peer0.org4.sipevita.example.com
        Port: 7051

################################################################################
# Capabilities
################################################################################
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

################################################################################
# Application defaults
################################################################################
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    # MAJORITY with 4 orgs = 3 of 4 required for lifecycle approval
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    # NOTE: This is the application-level default endorsement policy.
    # The chaincode-level invocation policy is set explicitly in deploy-chaincode.sh:
    # OutOf(3, 'Org1MSP.peer', 'Org2MSP.peer', 'Org3MSP.peer', 'Org4MSP.peer')
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

################################################################################
# Orderer defaults
################################################################################
Orderer: &OrdererDefaults
  # Addresses is deprecated in favour of OrdererEndpoints per org; kept for compatibility
  Addresses:
    - orderer1.sipevita.example.com:7050
    - orderer2.sipevita.example.com:7050
    - orderer3.sipevita.example.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

################################################################################
# Channel defaults
################################################################################
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

################################################################################
# Profiles
################################################################################
Profiles:
  SipevitaRaftChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      OrdererType: etcdraft
      EtcdRaft:
        Consenters:
          - Host: orderer1.sipevita.example.com
            Port: 7050
            ClientTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer1.sipevita.example.com/tls/server.crt
            ServerTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer1.sipevita.example.com/tls/server.crt
          - Host: orderer2.sipevita.example.com
            Port: 7050
            ClientTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer2.sipevita.example.com/tls/server.crt
            ServerTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer2.sipevita.example.com/tls/server.crt
          - Host: orderer3.sipevita.example.com
            Port: 7050
            ClientTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer3.sipevita.example.com/tls/server.crt
            ServerTLSCert: ../organizations/ordererOrganizations/sipevita.example.com/orderers/orderer3.sipevita.example.com/tls/server.crt
        Options:
          TickInterval: 500ms
          ElectionTick: 10
          HeartbeatTick: 1
          MaxInflightBlocks: 5
          SnapshotIntervalSize: 16 MB
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2
        - *Org3
        - *Org4
      Capabilities: *ApplicationCapabilities
